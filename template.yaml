AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DeviceWeave IoT Pay-Per-Request Execution System

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds: !Ref LambdaSubnetIds
    Environment:
      Variables:
        LOG_LEVEL: INFO
        LEARNING_TABLE_NAME: !Ref LearningTable
        LEARNING_CONFIDENCE_THRESHOLD: "0.85"
        CONFIDENCE_THRESHOLD: "0.4"
        DEVICE_REGISTRY_TABLE: !Ref DeviceRegistryTable
        KASA_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials"
        SWITCHBOT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials"
        GOVEE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials"
        MEMGRAPH_HOST: !Ref MemgraphHost
        MEMGRAPH_PORT: !Ref MemgraphPort
        MEMGRAPH_SECRET_ARN: !Ref MemgraphSecretArn
        WEATHER_LAT: !Ref WeatherLat
        WEATHER_LON: !Ref WeatherLon

Parameters:
  StageName:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - staging
      - dev

  # -----------------------------------------------------------------------
  # VPC — resolved from the shared infrastructure stack by GitHub Actions
  # -----------------------------------------------------------------------
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      VPC ID containing the Lambda subnets and Memgraph instance.
      Derived from the shared infrastructure stack (tarun-teamweave-shared).

  LambdaSubnetIds:
    Type: CommaDelimitedList
    Description: >
      Comma-separated private subnet IDs for Lambda VPC placement.
      From shared stack output LambdaSubnetIds
      (e.g. subnet-01714c0c1b4590e4e,subnet-0a3a13a3a3b5105cd).

  # -----------------------------------------------------------------------
  # Memgraph — resolved from the contextweave-rag-prod stack by GitHub Actions
  # -----------------------------------------------------------------------
  MemgraphHost:
    Type: String
    Description: >
      Private IP of the Memgraph EC2 instance.
      From contextweave-rag-prod stack output MemgraphPrivateIP.
    Default: ""

  MemgraphPort:
    Type: Number
    Description: Memgraph Bolt port (default 7687).
    Default: 7687

  MemgraphSecretArn:
    Type: String
    Description: >
      Secrets Manager ARN for Memgraph credentials {"username","password"}.
      From contextweave-rag-prod stack output MemgraphSecretArn.
    Default: ""

  # -----------------------------------------------------------------------
  # Weather — Open-Meteo (free, no API key).  Set to your deployment location.
  # -----------------------------------------------------------------------
  WeatherLat:
    Type: String
    Default: "33.1962097"
    Description: Latitude for Open-Meteo weather lookups (Plano, TX).

  WeatherLon:
    Type: String
    Default: "-96.5158954"
    Description: Longitude for Open-Meteo weather lookups (Plano, TX).

Resources:
  # -------------------------------------------------------------------
  # Lambda Security Group
  # Egress: Bolt (7687) to Memgraph + HTTPS (443) to cloud APIs / AWS
  # -------------------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "DeviceWeave Lambda SG — ${StageName}"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 7687
          ToPort: 7687
          CidrIp: 0.0.0.0/0
          Description: Memgraph Bolt (outbound to private subnet)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to cloud APIs and AWS services
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: "::/0"
          Description: HTTPS IPv6 egress
      Tags:
        - Key: Name
          Value: !Sub "deviceweave-lambda-sg-${StageName}"

  # -------------------------------------------------------------------
  # HTTP API (API Gateway v2)
  # -------------------------------------------------------------------
  DeviceWeaveApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowMethods:
          - POST
          - GET
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - '*'

  # -------------------------------------------------------------------
  # Execution Lambda
  # -------------------------------------------------------------------
  DeviceWeaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-handler-${StageName}"
      CodeUri: src/
      Handler: app.handler
      Description: >
        DeviceWeave execution engine — intent parsing, scene resolution,
        semantic device matching, behavior scoring, provider execution.
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningTable
        - DynamoDBReadPolicy:
            TableName: !Ref DeviceRegistryTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials-*"
        - !If
          - HasMemgraphSecret
          - AWSSecretsManagerGetSecretValuePolicy:
              SecretArn: !Ref MemgraphSecretArn
          - !Ref AWS::NoValue
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: "*"
      Events:
        ExecuteCommand:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /execute
            Method: POST
        LearnPhrase:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /learn
            Method: POST
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /health
            Method: GET
        ListDevices:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices
            Method: GET
        ListScenes:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /scenes
            Method: GET

  DeviceWeaveFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-handler-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # Ingestion Lambda
  # -------------------------------------------------------------------
  DeviceWeaveIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-ingestion-${StageName}"
      CodeUri: src/
      Handler: ingestion_handler.handler
      Timeout: 120
      Description: >
        DeviceWeave ingestion engine — cloud provider discovery (Kasa, SwitchBot,
        Govee), registry sync, phrase generation, behavior graph seeding.
      Environment:
        Variables:
          KASA_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials"
          SWITCHBOT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials"
          GOVEE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials"
          MEMGRAPH_HOST: !Ref MemgraphHost
          MEMGRAPH_PORT: !Ref MemgraphPort
          MEMGRAPH_SECRET_ARN: !Ref MemgraphSecretArn
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref DeviceRegistryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials-*"
        - !If
          - HasMemgraphSecret
          - AWSSecretsManagerGetSecretValuePolicy:
              SecretArn: !Ref MemgraphSecretArn
          - !Ref AWS::NoValue
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: "*"
      Events:
        TriggerIngest:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /ingest
            Method: POST
        ScheduledFullSync:
          Type: Schedule
          Properties:
            Schedule: rate(24 hours)
            Name: !Sub "deviceweave-full-sync-${StageName}"
            Description: Daily full device discovery and registry reconciliation
            Input: '{"provider": "kasa", "mode": "full"}'
            Enabled: true
        ScheduledDeltaSync:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Name: !Sub "deviceweave-delta-sync-${StageName}"
            Description: 6-hourly delta sync — writes only changed device records
            Input: '{"provider": "kasa", "mode": "delta"}'
            Enabled: true

  DeviceWeaveIngestionFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-ingestion-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # DynamoDB — Phrase Learning Store
  # -------------------------------------------------------------------
  LearningTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-phrases-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: phrase
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
        - AttributeName: phrase
          KeyType: RANGE

  # -------------------------------------------------------------------
  # DynamoDB — Device Registry
  # -------------------------------------------------------------------
  DeviceRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-registry-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
        - AttributeName: provider
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: provider-status-index
          KeySchema:
            - AttributeName: provider
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Conditions:
  HasMemgraphSecret: !Not [!Equals [!Ref MemgraphSecretArn, ""]]

Outputs:
  ApiBaseUrl:
    Description: Base URL for the DeviceWeave API
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "DeviceWeaveApiBaseUrl-${StageName}"

  ExecuteEndpoint:
    Description: POST /execute — natural language device or scene command
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/execute"

  LearnEndpoint:
    Description: POST /learn — add a phrase binding to a device
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/learn"

  IngestEndpoint:
    Description: POST /ingest — trigger device discovery and registry sync
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/ingest"

  DevicesEndpoint:
    Description: GET /devices — list static device catalog
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/devices"

  ScenesEndpoint:
    Description: GET /scenes — list registered scenes
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/scenes"

  LambdaSecurityGroupId:
    Description: Lambda SG ID — add as ingress rule on Memgraph's security group (port 7687)
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub "DeviceWeaveLambdaSG-${StageName}"

  LearningTableName:
    Description: DynamoDB phrase learning table
    Value: !Ref LearningTable
    Export:
      Name: !Sub "DeviceWeaveLearningTable-${StageName}"

  DeviceRegistryTableName:
    Description: DynamoDB device registry table
    Value: !Ref DeviceRegistryTable
    Export:
      Name: !Sub "DeviceWeaveRegistryTable-${StageName}"

  FunctionArn:
    Description: Execution Lambda ARN
    Value: !GetAtt DeviceWeaveFunction.Arn
    Export:
      Name: !Sub "DeviceWeaveFunctionArn-${StageName}"

  IngestionFunctionArn:
    Description: Ingestion Lambda ARN
    Value: !GetAtt DeviceWeaveIngestionFunction.Arn
    Export:
      Name: !Sub "DeviceWeaveIngestionFunctionArn-${StageName}"
