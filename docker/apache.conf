ServerName deviceweave.local

<VirtualHost *:80>

    # WSGI daemon — 4 threads, isolated process group
    WSGIDaemonProcess deviceweave \
        python-path=/app \
        threads=4 \
        display-name=deviceweave

    WSGIProcessGroup  deviceweave
    WSGIScriptAlias / /app/wsgi_handler.py

    <Directory /app>
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Pass Authorization header through (needed if auth is added later)
    WSGIPassAuthorization On

    LogLevel warn
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined

</VirtualHost>
