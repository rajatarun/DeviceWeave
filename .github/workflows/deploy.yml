name: DeviceWeave — SAM Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: prod
        type: choice
        options:
          - prod
          - staging
          - dev

# Prevent concurrent deploys to the same stage.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy via AWS SAM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Default stage for push-triggered runs; overridden by workflow_dispatch input.
      STAGE: ${{ github.event.inputs.stage || 'prod' }}
      STACK_NAME: deviceweave-${{ github.event.inputs.stage || 'prod' }}
      SAM_BUCKET_PREFIX: deviceweave-sam-artifacts

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Python — must match Lambda runtime declared in template.yaml
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----------------------------------------------------------------
      # 3. Install AWS SAM CLI explicitly (do NOT assume pre-installed)
      # ----------------------------------------------------------------
      - name: Install AWS SAM CLI
        run: |
          pip install --upgrade pip
          pip install aws-sam-cli==1.121.0

      # Verify SAM is usable before spending AWS credits.
      - name: Verify SAM CLI version
        run: sam --version

      # ----------------------------------------------------------------
      # 4. Configure AWS credentials from GitHub Secrets
      # ----------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ----------------------------------------------------------------
      # 5. Validate the SAM template before building
      # ----------------------------------------------------------------
      - name: Validate SAM template
        run: sam validate --region "${{ secrets.AWS_REGION }}"

      # ----------------------------------------------------------------
      # 6. Build Lambda package (resolves requirements.txt, creates .aws-sam/)
      # ----------------------------------------------------------------
      - name: SAM build
        run: |
          sam build \
            --use-container \
            --parallel

      # ----------------------------------------------------------------
      # 7. Ensure the S3 artifact bucket exists
      #    sam deploy --resolve-s3 creates/reuses a managed bucket per region.
      # ----------------------------------------------------------------
      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_IAM \
            --region "${{ secrets.AWS_REGION }}" \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
                StageName="$STAGE"

      # ----------------------------------------------------------------
      # 8. Print stack outputs for easy post-deploy verification
      # ----------------------------------------------------------------
      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output table
