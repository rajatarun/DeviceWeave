AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DeviceWeave IoT Pay-Per-Request Execution System

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds: !Ref LambdaSubnetIds
    Environment:
      Variables:
        LOG_LEVEL: INFO
        LEARNING_TABLE_NAME: !Ref LearningTable
        LEARNING_CONFIDENCE_THRESHOLD: "0.85"
        CONFIDENCE_THRESHOLD: "0.4"
        DEVICE_REGISTRY_TABLE: !Ref DeviceRegistryTable
        POLICY_TABLE_NAME: !Ref PolicyTable
        POLICY_CONFIDENCE_THRESHOLD: "0.85"
        PRESENCE_TABLE_NAME: !Ref PresenceTable
        SCENE_TABLE_NAME: !Ref SceneTable
        CONVERSATION_TABLE_NAME: !Ref ConversationTable
        LLM_PROVIDER: "bedrock"
        LLM_MODEL_ID: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
        OLLAMA_BASE_URL: ""
        OLLAMA_MODEL: "mistral"
        KASA_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials"
        SWITCHBOT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials"
        GOVEE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials"
        RING_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials"
        MEMGRAPH_PORT: !Ref MemgraphPort
        MEMGRAPH_SECRET_ARN: !Ref MemgraphSecretArn
        WEATHER_LAT: !Ref WeatherLat
        WEATHER_LON: !Ref WeatherLon

Parameters:
  StageName:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - staging
      - dev

  # -----------------------------------------------------------------------
  # VPC — resolved from the shared infrastructure stack by GitHub Actions
  # -----------------------------------------------------------------------
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      VPC ID containing the Lambda subnets and Memgraph instance.
      Derived from the shared infrastructure stack (tarun-teamweave-shared).

  LambdaSubnetIds:
    Type: CommaDelimitedList
    Description: >
      Comma-separated private subnet IDs for Lambda VPC placement.
      From shared stack output LambdaSubnetIds
      (e.g. subnet-01714c0c1b4590e4e,subnet-0a3a13a3a3b5105cd).

  # -----------------------------------------------------------------------
  # Memgraph — host is discovered at Lambda runtime via EC2 tag memgraph=true.
  # Only the port and secret ARN are supplied at deploy time.
  # -----------------------------------------------------------------------
  MemgraphPort:
    Type: Number
    Description: Memgraph Bolt port (default 7687).
    Default: 7687

  MemgraphSecretArn:
    Type: String
    Description: >
      Secrets Manager ARN for Memgraph credentials {"username","password"}.
      From contextweave-rag-prod stack output MemgraphSecretArn.
    Default: ""

  # -----------------------------------------------------------------------
  # AWS End User Messaging SMS (replaced Amazon Pinpoint SMS).
  # Phone numbers cannot be provisioned by CloudFormation; request one in
  # the End User Messaging console then supply the E.164 number here.
  # Leave EumOriginationNumber blank to deploy without SMS support.
  # -----------------------------------------------------------------------
  EumOriginationNumber:
    Type: String
    Default: ""
    Description: >
      E.164 phone number leased from AWS End User Messaging (e.g. +14155550100).
      Provision via End User Messaging console → Phone numbers → Request.
      After provisioning, enable two-way SMS and point it at SmsInboundTopic ARN.

  # -----------------------------------------------------------------------
  # Weather — Open-Meteo (free, no API key).  Set to your deployment location.
  # -----------------------------------------------------------------------
  WeatherLat:
    Type: String
    Default: "33.1962097"
    Description: Latitude for Open-Meteo weather lookups (Plano, TX).

  WeatherLon:
    Type: String
    Default: "-96.5158954"
    Description: Longitude for Open-Meteo weather lookups (Plano, TX).

Resources:
  # -------------------------------------------------------------------
  # Lambda Security Group
  # Egress: Bolt (7687) to Memgraph + HTTPS (443) to cloud APIs / AWS
  # -------------------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "DeviceWeave Lambda SG ${StageName}"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 7687
          ToPort: 7687
          CidrIp: 0.0.0.0/0
          Description: Memgraph Bolt (outbound to private subnet)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to cloud APIs and AWS services
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: "::/0"
          Description: HTTPS IPv6 egress
      Tags:
        - Key: Name
          Value: !Sub "deviceweave-lambda-sg-${StageName}"

  # -------------------------------------------------------------------
  # HTTP API (API Gateway v2)
  # -------------------------------------------------------------------
  DeviceWeaveApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowMethods:
          - POST
          - GET
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - '*'

  # -------------------------------------------------------------------
  # Execution Lambda
  # -------------------------------------------------------------------
  DeviceWeaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-handler-${StageName}"
      CodeUri: src/
      Handler: app.handler
      Description: >
        DeviceWeave execution engine — intent parsing, scene resolution,
        semantic device matching, behavior scoring, provider execution.
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DeviceRegistryTable
        - DynamoDBReadPolicy:
            TableName: !Ref PolicyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PresenceTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SceneTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials-*"
        - !If
          - HasMemgraphSecret
          - AWSSecretsManagerGetSecretValuePolicy:
              SecretArn: !Ref MemgraphSecretArn
          - !Ref AWS::NoValue
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
                - ec2:DescribeInstances
              Resource: "*"
      Events:
        ExecuteCommand:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /execute
            Method: POST
        LearnPhrase:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /learn
            Method: POST
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /health
            Method: GET
        ListProviders:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /providers
            Method: GET
        ListDevices:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices
            Method: GET
        ListScenes:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /scenes
            Method: GET
        UpdatePresence:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /presence
            Method: POST
        GetPresence:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /presence
            Method: GET
        CreateDevice:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices
            Method: POST
        GetDevice:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices/{device_id}
            Method: GET
        UpdateDevice:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices/{device_id}
            Method: PUT
        DeleteDevice:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /devices/{device_id}
            Method: DELETE
        ListLearnings:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /learnings
            Method: GET
        DeleteLearning:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /learnings
            Method: DELETE
        DeleteScene:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /scenes/{scene_id}
            Method: DELETE

  DeviceWeaveFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-handler-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # Ingestion Lambda
  # -------------------------------------------------------------------
  DeviceWeaveIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-ingestion-${StageName}"
      CodeUri: src/
      Handler: ingestion_handler.handler
      Timeout: 120
      Description: >
        DeviceWeave ingestion engine — cloud provider discovery (Kasa, SwitchBot,
        Govee), registry sync, phrase generation, behavior graph seeding.
      Environment:
        Variables:
          KASA_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials"
          SWITCHBOT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials"
          GOVEE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials"
          RING_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials"
          MEMGRAPH_PORT: !Ref MemgraphPort
          MEMGRAPH_SECRET_ARN: !Ref MemgraphSecretArn
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref DeviceRegistryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials-*"
        - !If
          - HasMemgraphSecret
          - AWSSecretsManagerGetSecretValuePolicy:
              SecretArn: !Ref MemgraphSecretArn
          - !Ref AWS::NoValue
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
                - ec2:DescribeInstances
              Resource: "*"
      Events:
        TriggerIngest:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /ingest
            Method: POST
        ScheduledFullSync:
          Type: Schedule
          Properties:
            Schedule: rate(24 hours)
            Name: !Sub "deviceweave-full-sync-${StageName}"
            Description: Daily full device discovery and registry reconciliation
            Input: '{"provider": "kasa", "mode": "full"}'
            Enabled: true
        ScheduledDeltaSync:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Name: !Sub "deviceweave-delta-sync-${StageName}"
            Description: 6-hourly delta sync — writes only changed device records
            Input: '{"provider": "kasa", "mode": "delta"}'
            Enabled: true

  DeviceWeaveIngestionFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-ingestion-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # Policy Authoring Lambda
  # Converts natural language rules → Policy DSL via Claude Sonnet,
  # validates the output, and persists valid rules to PolicyTable.
  # -------------------------------------------------------------------
  PolicyAuthoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-policy-authoring-${StageName}"
      CodeUri: src/
      Handler: policy_authoring.handler.handler
      Timeout: 60
      Description: >
        DeviceWeave policy authoring engine — natural language → LLM compiler
        → strict Policy DSL validation → DynamoDB persistence.
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref PolicyTable
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: "*"
      Events:
        AuthorPolicy:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /policies/author
            Method: POST
        ListPolicies:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /policies
            Method: GET
        GetPolicy:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /policies/{rule_id}
            Method: GET
        DeletePolicy:
          Type: HttpApi
          Properties:
            ApiId: !Ref DeviceWeaveApi
            Path: /policies/{rule_id}
            Method: DELETE

  PolicyAuthoringFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-policy-authoring-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # AWS End User Messaging — two-way SMS (replaced Amazon Pinpoint SMS)
  #
  # Low-cost pattern:
  #   User SMS → EUM long code (~$1/mo) → SmsInboundTopic → Lambda
  #   Lambda → send_text_message (pinpoint-sms-voice-v2) → reply SMS
  #   (~$0.0075 per message each direction)
  #
  # One-time console step (CloudFormation cannot provision phone numbers):
  #   End User Messaging console → Phone numbers → Request phone number
  #   → enable Two-way SMS → set SNS topic to SmsInboundTopic ARN
  #   → set EumOriginationNumber parameter to the provisioned E.164 number
  # -------------------------------------------------------------------
  SmsInboundTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "deviceweave-sms-inbound-${StageName}"

  SmsInboundTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SmsInboundTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sms-voice.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SmsInboundTopic

  DeviceWeaveSmsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "deviceweave-sms-${StageName}"
      CodeUri: src/
      Handler: sms_handler.handler
      Timeout: 60
      Description: >
        DeviceWeave SMS handler — receives End User Messaging inbound SMS via
        SNS, runs the Bedrock conversational agent, replies via
        pinpoint-sms-voice-v2 send_text_message. Phone number is used as
        session_id for persistent per-user conversation.
      Environment:
        Variables:
          LOG_LEVEL: INFO
          EUM_ORIGINATION_NUMBER: !Ref EumOriginationNumber
          CONVERSATION_TABLE_NAME: !Ref ConversationTable
          DEVICE_REGISTRY_TABLE: !Ref DeviceRegistryTable
          LEARNING_TABLE_NAME: !Ref LearningTable
          POLICY_TABLE_NAME: !Ref PolicyTable
          PRESENCE_TABLE_NAME: !Ref PresenceTable
          SCENE_TABLE_NAME: !Ref SceneTable
          LLM_MODEL_ID: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          MEMGRAPH_PORT: !Ref MemgraphPort
          MEMGRAPH_SECRET_ARN: !Ref MemgraphSecretArn
          WEATHER_LAT: !Ref WeatherLat
          WEATHER_LON: !Ref WeatherLon
          KASA_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials"
          SWITCHBOT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials"
          GOVEE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials"
          RING_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials"
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref LambdaSubnetIds
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningTable
        - DynamoDBReadPolicy:
            TableName: !Ref DeviceRegistryTable
        - DynamoDBReadPolicy:
            TableName: !Ref PolicyTable
        - DynamoDBReadPolicy:
            TableName: !Ref PresenceTable
        - DynamoDBReadPolicy:
            TableName: !Ref SceneTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/kasa-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/switchbot-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/govee-credentials-*"
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:deviceweave/ring-credentials-*"
        - !If
          - HasMemgraphSecret
          - AWSSecretsManagerGetSecretValuePolicy:
              SecretArn: !Ref MemgraphSecretArn
          - !Ref AWS::NoValue
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
        - Statement:
            - Effect: Allow
              Action: sms-voice:SendTextMessage
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
                - ec2:DescribeInstances
              Resource: "*"
      Events:
        SmsInbound:
          Type: SNS
          Properties:
            Topic: !Ref SmsInboundTopic

  DeviceWeaveSmsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/deviceweave-sms-${StageName}"
      RetentionInDays: 14

  # -------------------------------------------------------------------
  # DynamoDB — Phrase Learning Store
  # -------------------------------------------------------------------
  LearningTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-phrases-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: phrase
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
        - AttributeName: phrase
          KeyType: RANGE

  # -------------------------------------------------------------------
  # DynamoDB — Device Registry
  # -------------------------------------------------------------------
  DeviceRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-registry-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
        - AttributeName: provider
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: provider-status-index
          KeySchema:
            - AttributeName: provider
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -------------------------------------------------------------------
  # DynamoDB — Presence Store
  # Single-item table tracking home-occupancy state for the Policy Engine.
  # Updated via POST /presence; read by context_provider.py on each
  # /execute call.
  # -------------------------------------------------------------------
  PresenceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-presence-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  # -------------------------------------------------------------------
  # DynamoDB — Policy Store
  # Stores validated Policy DSL rules with full version history.
  # -------------------------------------------------------------------
  PolicyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-policies-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: rule_id
          AttributeType: S
        - AttributeName: version
          AttributeType: N
        - AttributeName: device_type
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: rule_id
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: device-type-created-index
          KeySchema:
            - AttributeName: device_type
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -------------------------------------------------------------------
  # DynamoDB — Scene Deletion Store
  # Tracks scenes deleted via DELETE /scenes/{scene_id}.
  # The active catalog is SCENE_CATALOG minus any deleted IDs here.
  # -------------------------------------------------------------------
  SceneTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-scenes-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      AttributeDefinitions:
        - AttributeName: scene_id
          AttributeType: S
      KeySchema:
        - AttributeName: scene_id
          KeyType: HASH

  # -------------------------------------------------------------------
  # DynamoDB — Conversation Store
  # Stores Bedrock Converse API message history per session_id.
  # Items expire automatically via DynamoDB TTL (24 h).
  # -------------------------------------------------------------------
  ConversationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "deviceweave-conversations-${StageName}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH

Conditions:
  HasMemgraphSecret: !Not [!Equals [!Ref MemgraphSecretArn, ""]]

Outputs:
  ApiBaseUrl:
    Description: Base URL for the DeviceWeave API
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "DeviceWeaveApiBaseUrl-${StageName}"

  ExecuteEndpoint:
    Description: POST /execute — natural language device or scene command
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/execute"

  LearnEndpoint:
    Description: POST /learn — add a phrase binding to a device
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/learn"

  IngestEndpoint:
    Description: POST /ingest — trigger device discovery and registry sync
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/ingest"

  DevicesEndpoint:
    Description: GET /devices — list static device catalog
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/devices"

  ScenesEndpoint:
    Description: GET /scenes — list registered scenes
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/scenes"

  LambdaSecurityGroupId:
    Description: Lambda SG ID — add as ingress rule on Memgraph's security group (port 7687)
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub "DeviceWeaveLambdaSG-${StageName}"

  LearningTableName:
    Description: DynamoDB phrase learning table
    Value: !Ref LearningTable
    Export:
      Name: !Sub "DeviceWeaveLearningTable-${StageName}"

  DeviceRegistryTableName:
    Description: DynamoDB device registry table
    Value: !Ref DeviceRegistryTable
    Export:
      Name: !Sub "DeviceWeaveRegistryTable-${StageName}"

  FunctionArn:
    Description: Execution Lambda ARN
    Value: !GetAtt DeviceWeaveFunction.Arn
    Export:
      Name: !Sub "DeviceWeaveFunctionArn-${StageName}"

  IngestionFunctionArn:
    Description: Ingestion Lambda ARN
    Value: !GetAtt DeviceWeaveIngestionFunction.Arn
    Export:
      Name: !Sub "DeviceWeaveIngestionFunctionArn-${StageName}"

  PolicyAuthoringFunctionArn:
    Description: Policy Authoring Lambda ARN
    Value: !GetAtt PolicyAuthoringFunction.Arn
    Export:
      Name: !Sub "DeviceWeavePolicyAuthoringFunctionArn-${StageName}"

  PolicyTableName:
    Description: DynamoDB policy store table
    Value: !Ref PolicyTable
    Export:
      Name: !Sub "DeviceWeavePolicyTable-${StageName}"

  AuthorPolicyEndpoint:
    Description: POST /policies/author — compile and store a natural language rule
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/policies/author"

  ListPoliciesEndpoint:
    Description: GET /policies — list active policies
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/policies"

  PresenceEndpoint:
    Description: POST /presence — update home-occupancy state for the Policy Engine
    Value: !Sub "https://${DeviceWeaveApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/presence"

  PresenceTableName:
    Description: DynamoDB presence table (home-occupancy state)
    Value: !Ref PresenceTable
    Export:
      Name: !Sub "DeviceWeavePresenceTable-${StageName}"
